    <path d="M0 180C44 116 89 78 180 42v138z" fill="rgba(0,0,0,.13)"/>
    <text x="90" y="113" text-anchor="middle" class="fc" fill="#fff">FC</text>
    <text x="90" y="222" text-anchor="middle" class="label">C4</text>
  </g>

  <g transform="translate(80 1125)">
    <text x="0" y="0" class="sub">Mia preferenza: B2 o B3. B2 è più elegante, B3 ha più personalità nella home.</text>
