  <g transform="translate(220 820)">
    <rect width="180" height="180" rx="42" fill="url(#lightC)" filter="url(#shadow)"/>
    <path d="M0 180C44 116 89 78 180 42v138z" fill="rgba(0,0,0,.035)"/>
    <text x="90" y="113" text-anchor="middle" class="fc" fill="#fff">FC</text>
    <text x="90" y="222" text-anchor="middle" class="label">C1</text>
  </g>
  <g transform="translate(520 820)">
    <rect width="180" height="180" rx="42" fill="url(#lightC)" filter="url(#shadow)"/>
    <path d="M0 180C44 116 89 78 180 42v138z" fill="rgba(0,0,0,.06)"/>
    <text x="90" y="113" text-anchor="middle" class="fc" fill="#fff">FC</text>
    <text x="90" y="222" text-anchor="middle" class="label">C2</text>
  </g>
  <g transform="translate(820 820)">
    <rect width="180" height="180" rx="42" fill="url(#lightC)" filter="url(#shadow)"/>
    <path d="M0 180C44 116 89 78 180 42v138z" fill="rgba(0,0,0,.09)"/>
    <text x="90" y="113" text-anchor="middle" class="fc" fill="#fff">FC</text>
    <text x="90" y="222" text-anchor="middle" class="label">C3</text>
  </g>
