    <path d="M0 180C44 116 89 78 180 42v138z" fill="rgba(0,0,0,.09)"/>
    <text x="90" y="113" text-anchor="middle" class="fc" fill="#fff">FC</text>
    <text x="90" y="222" text-anchor="middle" class="label">B3</text>
  </g>
  <g transform="translate(1120 520)">
    <rect width="180" height="180" rx="42" fill="url(#lightB)" filter="url(#shadow)"/>
    <path d="M0 180C44 116 89 78 180 42v138z" fill="rgba(0,0,0,.13)"/>
    <text x="90" y="113" text-anchor="middle" class="fc" fill="#fff">FC</text>
    <text x="90" y="222" text-anchor="middle" class="label">B4</text>
  </g>

