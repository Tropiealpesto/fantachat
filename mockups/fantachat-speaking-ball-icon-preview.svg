<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="26" stdDeviation="24" flood-color="#0f172a" flood-opacity=".18"/>
    </filter>
    <linearGradient id="green" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#15803d"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#c9650f"/>
      <stop offset="1" stop-color="#e07b1a"/>
    </linearGradient>
    <linearGradient id="ballSoft" x1=".15" y1="0" x2=".85" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".6" stop-color="#f6faf7"/>
      <stop offset="1" stop-color="#dfe8e2"/>
    </linearGradient>
    <linearGradient id="chatGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#0f5f2d"/>
    </linearGradient>
    <style>
      .bg { fill:#f4f7f4; }
      .title { font:900 44px 'DM Sans','Inter',Arial,sans-serif; fill:#0f172a; letter-spacing:-.8px; }
      .sub { font:700 21px 'DM Sans','Inter',Arial,sans-serif; fill:#64748b; }
      .small { font:900 19px 'DM Sans','Inter',Arial,sans-serif; fill:#64748b; }
      .curve { fill:none; stroke-linecap:round; stroke-linejoin:round; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="900"/>
  <text x="80" y="86" class="title">Proposta icona: pallone che parla</text>
  <text x="80" y="124" class="sub">Niente scritta: simbolo più forte e leggibile, calcio + chat in un solo segno.</text>

  <g transform="translate(120 185)">
    <rect width="520" height="520" rx="116" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="18" y="18" width="484" height="484" rx="98" fill="#fff" stroke="#eef2f0" stroke-width="3"/>

    <!-- symmetric brand curves -->
    <path class="curve" d="M104 414C154 338 154 242 104 106" stroke="url(#green)" stroke-width="11"/>
    <path class="curve" d="M416 414C366 338 366 242 416 106" stroke="url(#orange)" stroke-width="11"/>
    <path class="curve" d="M148 428C191 351 191 229 148 92" stroke="url(#orange)" stroke-width="6" opacity=".82"/>
    <path class="curve" d="M372 428C329 351 329 229 372 92" stroke="url(#green)" stroke-width="6" opacity=".82"/>

    <!-- speaking ball -->
    <g transform="translate(125 118)">
      <!-- chat tail behind ball -->
      <path d="M234 228c38 7 64 26 78 58-37-4-67-16-90-38z" fill="url(#chatGreen)"/>

      <circle cx="135" cy="135" r="126" fill="url(#ballSoft)" stroke="#dbe7df" stroke-width="5"/>
      <circle cx="135" cy="135" r="114" fill="none" stroke="#eef2f0" stroke-width="3"/>

      <!-- football geometry -->
      <path d="M135 64l45 33-17 54h-56L90 97z" fill="#0f172a"/>
      <path d="M90 97 48 83M180 97l42-14M107 151l-29 43M163 151l29 43M135 64V24" class="curve" stroke="#0f172a" stroke-width="11"/>
      <path d="M48 83c-16 27-23 55-18 85M222 83c16 27 23 55 18 85M78 194c28 31 66 43 114 0" class="curve" stroke="#0f172a" stroke-width="11"/>

      <!-- speech mouth -->
      <path d="M82 218h106c28 0 50-21 50-47v-5c0-26-22-47-50-47h-29l-29 24-29-24H82c-28 0-50 21-50 47v5c0 26 22 47 50 47z"
            fill="url(#chatGreen)" stroke="#ffffff" stroke-width="7"/>
      <path d="M77 165h74M77 187h50" stroke="#fff" stroke-width="11" stroke-linecap="round"/>
      <circle cx="176" cy="176" r="14" fill="#e07b1a"/>
    </g>
  </g>

  <g transform="translate(760 210)">
    <rect width="300" height="550" rx="58" fill="#0f172a" filter="url(#shadow)"/>
    <rect x="18" y="18" width="264" height="514" rx="44" fill="#f7faf8"/>
    <rect x="56" y="42" width="152" height="25" rx="12" fill="#111827"/>
    <text x="42" y="112" class="small">Preview home screen</text>

    <g transform="translate(38 150) scale(.42)">
      <rect width="180" height="180" rx="42" fill="#fff" stroke="#eef2f0" stroke-width="2"/>
      <path class="curve" d="M36 145C54 118 54 84 36 37" stroke="url(#green)" stroke-width="4"/>
      <path class="curve" d="M144 145C126 118 126 84 144 37" stroke="url(#orange)" stroke-width="4"/>
      <path class="curve" d="M51 150C66 122 66 78 51 32" stroke="url(#orange)" stroke-width="2.5"/>
      <path class="curve" d="M129 150C114 122 114 78 129 32" stroke="url(#green)" stroke-width="2.5"/>
      <g transform="translate(45 48) scale(.32)">
        <path d="M234 228c38 7 64 26 78 58-37-4-67-16-90-38z" fill="url(#chatGreen)"/>
        <circle cx="135" cy="135" r="126" fill="url(#ballSoft)" stroke="#dbe7df" stroke-width="5"/>
        <path d="M135 64l45 33-17 54h-56L90 97z" fill="#0f172a"/>
        <path d="M90 97 48 83M180 97l42-14M107 151l-29 43M163 151l29 43M135 64V24" class="curve" stroke="#0f172a" stroke-width="11"/>
        <path d="M48 83c-16 27-23 55-18 85M222 83c16 27 23 55 18 85M78 194c28 31 66 43 114 0" class="curve" stroke="#0f172a" stroke-width="11"/>
        <path d="M82 218h106c28 0 50-21 50-47v-5c0-26-22-47-50-47h-29l-29 24-29-24H82c-28 0-50 21-50 47v5c0 26 22 47 50 47z" fill="url(#chatGreen)" stroke="#fff" stroke-width="7"/>
        <path d="M77 165h74M77 187h50" stroke="#fff" stroke-width="11" stroke-linecap="round"/>
        <circle cx="176" cy="176" r="14" fill="#e07b1a"/>
      </g>
    </g>

    <text x="42" y="250" class="small" fill="#0f172a">FantaChat</text>
    <rect x="42" y="286" width="216" height="62" rx="18" fill="#fff" stroke="#e5e7eb"/>
    <rect x="42" y="365" width="216" height="62" rx="18" fill="#fff" stroke="#e5e7eb"/>
    <rect x="42" y="444" width="216" height="44" rx="16" fill="#16a34a"/>
  </g>

  <g transform="translate(80 780)">
    <text x="0" y="0" class="title" font-size="30">Direzione</text>
    <text x="0" y="42" class="sub" font-size="19">Il segno è immediato: pallone + fumetto, senza bisogno della scritta.</text>
    <text x="0" y="76" class="sub" font-size="19">Le curve mantengono il movimento del brand e rendono l’icona meno generica.</text>
  </g>
</svg>
