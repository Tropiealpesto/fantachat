<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity=".18"/>
    </filter>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffad55"/>
      <stop offset="1" stop-color="#e07b1a"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="1" stop-color="#00030a"/>
    </linearGradient>
    <style>
      .bg { fill:#f4f7f4; }
      .title { font:900 52px 'DM Sans','Inter',Arial,sans-serif; fill:#0f172a; letter-spacing:-1px; }
      .sub { font:700 23px 'DM Sans','Inter',Arial,sans-serif; fill:#64748b; }
      .label { font:900 23px 'DM Sans','Inter',Arial,sans-serif; fill:#0f172a; }
      .desc { font:700 16px 'DM Sans','Inter',Arial,sans-serif; fill:#64748b; }
      .fc { font:1000 76px 'DM Sans','Inter',Arial,sans-serif; letter-spacing:-4px; }
      .curve { fill:none; stroke-linecap:round; stroke-linejoin:round; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1000"/>
  <text x="80" y="88" class="title">FantaChat — direzioni icona ultra-semplici</text>
  <text x="80" y="128" class="sub">Massimo 1-2 elementi grandi. Pensate per reggere piccole nella home, come le app concorrenti.</text>

  <!-- 1 -->
  <g transform="translate(80 190)">
    <rect width="320" height="330" rx="30" fill="#fff" stroke="#e5e7eb"/>
    <g filter="url(#shadow)" transform="translate(70 36)">
      <rect width="180" height="180" rx="42" fill="#fff"/>
      <circle cx="90" cy="84" r="58" fill="#fff" stroke="#111827" stroke-width="12"/>
      <path d="M129 124c34 6 53 21 61 47-31-4-55-14-74-33z" fill="#15803d"/>
      <path d="M90 47l21 16-8 25H77l-8-25z" fill="#111827"/>
      <path d="M69 63 44 55M111 63l25-8M77 88l-17 28M103 88l17 28" class="curve" stroke="#111827" stroke-width="8"/>
      <circle cx="132" cy="128" r="11" fill="#e07b1a"/>
    </g>
    <text x="28" y="260" class="label">1. Pallone che parla</text>
    <text x="28" y="289" class="desc">Il più chiaro: calcio + chat subito.</text>
  </g>

  <!-- 2 -->
  <g transform="translate(460 190)">
    <rect width="320" height="330" rx="30" fill="#fff" stroke="#e5e7eb"/>
    <g filter="url(#shadow)" transform="translate(70 36)">
      <rect width="180" height="180" rx="42" fill="url(#green)"/>
      <path d="M50 48h80c25 0 44 18 44 42v22c0 24-19 42-44 42H94l-37 28v-28h-7c-25 0-44-18-44-42V90c0-24 19-42 44-42z" fill="#fff"/>
      <text x="89" y="116" text-anchor="middle" class="fc" fill="#15803d">FC</text>
      <circle cx="139" cy="63" r="12" fill="#e07b1a"/>
    </g>
    <text x="28" y="260" class="label">2. FC bubble</text>
    <text x="28" y="289" class="desc">Social, leggibile, molto app icon.</text>
  </g>

  <!-- 3 -->
  <g transform="translate(840 190)">
    <rect width="320" height="330" rx="30" fill="#fff" stroke="#e5e7eb"/>
    <g filter="url(#shadow)" transform="translate(70 36)">
      <rect width="180" height="180" rx="42" fill="url(#orange)"/>
      <circle cx="90" cy="82" r="55" fill="#fff"/>
      <path d="M122 121c27 6 43 20 49 42-26-4-46-13-62-30z" fill="#fff"/>
      <path d="M90 49l18 13-7 22H79l-7-22z" fill="#14532d"/>
      <path d="M72 62 50 55M108 62l22-7M80 84l-15 25M100 84l15 25" class="curve" stroke="#14532d" stroke-width="7"/>
      <circle cx="90" cy="82" r="52" fill="none" stroke="#14532d" stroke-width="5" opacity=".18"/>
    </g>
    <text x="28" y="260" class="label">3. Ball bubble arancio</text>
    <text x="28" y="289" class="desc">Più memorabile, arancione protagonista.</text>
  </g>

  <!-- 4 -->
  <g transform="translate(1220 190)">
    <rect width="320" height="330" rx="30" fill="#fff" stroke="#e5e7eb"/>
    <g filter="url(#shadow)" transform="translate(70 36)">
      <rect width="180" height="180" rx="42" fill="#fff"/>
      <path d="M47 92c0-32 19-54 48-54 21 0 37 11 47 31" class="curve" stroke="#15803d" stroke-width="17"/>
      <path d="M133 88c0 32-19 54-48 54-21 0-37-11-47-31" class="curve" stroke="#e07b1a" stroke-width="17"/>
      <circle cx="90" cy="90" r="11" fill="#111827"/>
    </g>
    <text x="28" y="260" class="label">4. Nodo FantaChat</text>
    <text x="28" y="289" class="desc">Astratto, semplice, distintivo.</text>
  </g>

  <!-- 5 -->
  <g transform="translate(270 590)">
    <rect width="320" height="330" rx="30" fill="#fff" stroke="#e5e7eb"/>
    <g filter="url(#shadow)" transform="translate(70 36)">
      <rect width="180" height="180" rx="42" fill="#fff"/>
      <path d="M89 24c41 45 38 89 9 127-17 22-23 41-10 64-39-28-45-67-17-105 22-31 27-56 18-86z" fill="url(#green)"/>
      <path d="M106 31c-14 47-6 76 19 107 28 35 22 73-18 104 13-34 0-56-22-81-29-34-24-78 21-130z" fill="url(#orange)"/>
      <rect x="55" y="136" width="70" height="16" rx="8" fill="#111827"/>
    </g>
    <text x="28" y="260" class="label">5. Trofeo fiamma</text>
    <text x="28" y="289" class="desc">Più premium, ma meno immediato della chat.</text>
  </g>

  <!-- 6 -->
  <g transform="translate(650 590)">
    <rect width="320" height="330" rx="30" fill="#fff" stroke="#e5e7eb"/>
    <g filter="url(#shadow)" transform="translate(70 36)">
      <rect width="180" height="180" rx="42" fill="url(#dark)"/>
      <path d="M51 48h78c25 0 44 18 44 42v23c0 24-19 42-44 42H94l-36 27v-27h-7c-25 0-44-18-44-42V90c0-24 19-42 44-42z" fill="none" stroke="#58ff94" stroke-width="10"/>
      <path d="M58 91h63M58 71h78" stroke="#58ff94" stroke-width="9" stroke-linecap="round"/>
      <circle cx="137" cy="98" r="13" fill="#ff8a26"/>
    </g>
    <text x="28" y="260" class="label">6. Chat neon</text>
    <text x="28" y="289" class="desc">Ottima se il dark theme diventa identità forte.</text>
  </g>

  <!-- 7 -->
  <g transform="translate(1030 590)">
    <rect width="320" height="330" rx="30" fill="#fff" stroke="#e5e7eb"/>
    <g filter="url(#shadow)" transform="translate(70 36)">
      <rect width="180" height="180" rx="42" fill="#fff"/>
      <path d="M90 28l60 26v43c0 44-25 68-60 85-35-17-60-41-60-85V54z" fill="#15803d"/>
      <path d="M58 83h64c18 0 31 13 31 30v12c0 17-13 30-31 30H93l-28 21v-21h-7c-18 0-31-13-31-30v-12c0-17 13-30 31-30z" fill="#fff"/>
      <circle cx="127" cy="125" r="10" fill="#e07b1a"/>
      <path d="M60 113h45" stroke="#15803d" stroke-width="7" stroke-linecap="round"/>
    </g>
    <text x="28" y="260" class="label">7. Scudo chat</text>
    <text x="28" y="289" class="desc">Fantasy/lega più evidente, ancora semplice.</text>
  </g>
</svg>
