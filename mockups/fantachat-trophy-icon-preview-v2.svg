<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="26" flood-color="#0f172a" flood-opacity=".22"/>
    </filter>
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="appOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffb15b"/>
      <stop offset=".46" stop-color="#e98622"/>
      <stop offset="1" stop-color="#c9650f"/>
    </linearGradient>
    <linearGradient id="creamMetal" x1=".15" y1="0" x2=".9" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".35" stop-color="#fff1d8"/>
      <stop offset=".68" stop-color="#ffd29a"/>
      <stop offset="1" stop-color="#fff9ed"/>
    </linearGradient>
    <linearGradient id="greenCore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#24d46a"/>
      <stop offset="1" stop-color="#0f5f2d"/>
    </linearGradient>
    <radialGradient id="shine" cx=".28" cy=".18" r=".9">
      <stop offset="0" stop-color="rgba(255,255,255,.58)"/>
      <stop offset=".38" stop-color="rgba(255,255,255,.12)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <style>
      .bg { fill:#f4f7f4; }
      .title { font:900 44px 'DM Sans','Inter',Arial,sans-serif; fill:#0f172a; letter-spacing:-.8px; }
      .sub { font:700 21px 'DM Sans','Inter',Arial,sans-serif; fill:#64748b; }
      .word { font:1000 45px 'DM Sans','Inter',Arial,sans-serif; letter-spacing:-1.9px; }
      .small { font:900 19px 'DM Sans','Inter',Arial,sans-serif; fill:#64748b; }
      .micro { font:1000 18px 'DM Sans','Inter',Arial,sans-serif; letter-spacing:.4px; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="900"/>
  <text x="80" y="86" class="title">Proposta icona: Trofeo FantaChat v2</text>
  <text x="80" y="124" class="sub">Sfondo arancione mantenuto, scritta più bassa senza sfondo, trofeo più proprietario e particolare.</text>

  <g transform="translate(120 190)">
    <rect width="520" height="520" rx="116" fill="url(#appOrange)" filter="url(#softShadow)"/>
    <rect x="20" y="20" width="480" height="480" rx="96" fill="url(#shine)" opacity=".9"/>

    <!-- subtle motion rings -->
    <path d="M72 390c67-88 151-132 252-132 45 0 86 9 124 27" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="16" stroke-linecap="round"/>
    <path d="M80 422c69-67 149-101 239-101 45 0 87 7 126 21" fill="none" stroke="rgba(15,83,45,.18)" stroke-width="10" stroke-linecap="round"/>

    <!-- proprietary trophy: chat comet + shield + pitch crown -->
    <g transform="translate(91 64)">
      <!-- outer impossible ribbon -->
      <path d="M168 14c74 0 132 43 132 102 0 47-36 85-89 98l-43 67-43-67C72 201 36 163 36 116 36 57 94 14 168 14z"
            fill="url(#creamMetal)" stroke="#fff8eb" stroke-width="8" stroke-linejoin="round"/>
      <path d="M76 118c0-36 38-61 92-61s92 25 92 61-38 61-92 61-92-25-92-61z"
            fill="url(#greenCore)" filter="url(#innerGlow)"/>

      <!-- football star core -->
      <path d="M168 76l13 26 29 4-21 20 5 29-26-14-26 14 5-29-21-20 29-4z"
            fill="#fff"/>
      <circle cx="168" cy="118" r="9" fill="#0f5f2d"/>

      <!-- asymmetric trophy wings, more unusual than handles -->
      <path d="M59 111C20 112 5 137 13 164c8 28 42 48 91 51" fill="none" stroke="#fff8eb" stroke-width="18" stroke-linecap="round"/>
      <path d="M277 94c36-11 63 4 67 31 5 33-25 64-84 80" fill="none" stroke="#fff8eb" stroke-width="18" stroke-linecap="round"/>

      <!-- pitch crown lines -->
      <path d="M104 210h128" stroke="#fff8eb" stroke-width="16" stroke-linecap="round"/>
      <path d="M128 233h80" stroke="#0f5f2d" stroke-width="13" stroke-linecap="round"/>
      <path d="M151 247h34v36h-34z" fill="#fff8eb"/>
      <path d="M103 288h130c14 0 25 11 25 25v14H78v-14c0-14 11-25 25-25z" fill="#fff8eb"/>
      <path d="M93 333h150" stroke="#0f5f2d" stroke-width="18" stroke-linecap="round"/>

      <!-- small chat tail accent -->
      <path d="M225 158l42 12-34 20z" fill="#24d46a"/>
      <circle cx="262" cy="88" r="15" fill="#e98622" stroke="#fff8eb" stroke-width="5"/>
    </g>

    <!-- wordmark lower, no background -->
    <text x="260" y="462" text-anchor="middle" class="word">
      <tspan fill="#ffffff">Fanta</tspan><tspan fill="#14532d">Chat</tspan>
    </text>
  </g>

  <g transform="translate(760 210)">
    <rect width="300" height="550" rx="58" fill="#0f172a" filter="url(#softShadow)"/>
    <rect x="18" y="18" width="264" height="514" rx="44" fill="#f7faf8"/>
    <rect x="56" y="42" width="152" height="25" rx="12" fill="#111827"/>
    <text x="42" y="112" class="small">Preview home screen</text>

    <g transform="translate(38 150) scale(.42)">
      <rect width="180" height="180" rx="42" fill="url(#appOrange)"/>
      <path d="M25 136c24-31 54-47 89-47 16 0 31 3 44 9" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="6" stroke-linecap="round"/>
      <g transform="translate(30 20) scale(.36)">
        <path d="M168 14c74 0 132 43 132 102 0 47-36 85-89 98l-43 67-43-67C72 201 36 163 36 116 36 57 94 14 168 14z"
              fill="url(#creamMetal)" stroke="#fff8eb" stroke-width="8"/>
        <path d="M76 118c0-36 38-61 92-61s92 25 92 61-38 61-92 61-92-25-92-61z" fill="url(#greenCore)"/>
        <path d="M168 76l13 26 29 4-21 20 5 29-26-14-26 14 5-29-21-20 29-4z" fill="#fff"/>
        <path d="M59 111C20 112 5 137 13 164c8 28 42 48 91 51" fill="none" stroke="#fff8eb" stroke-width="18" stroke-linecap="round"/>
        <path d="M277 94c36-11 63 4 67 31 5 33-25 64-84 80" fill="none" stroke="#fff8eb" stroke-width="18" stroke-linecap="round"/>
        <path d="M104 210h128" stroke="#fff8eb" stroke-width="16" stroke-linecap="round"/>
        <path d="M103 288h130c14 0 25 11 25 25v14H78v-14c0-14 11-25 25-25z" fill="#fff8eb"/>
      </g>
      <text x="90" y="160" text-anchor="middle" class="micro">
        <tspan fill="#fff">Fanta</tspan><tspan fill="#14532d">Chat</tspan>
      </text>
    </g>

    <text x="42" y="250" class="small" fill="#0f172a">FantaChat</text>
    <rect x="42" y="286" width="216" height="62" rx="18" fill="#fff" stroke="#e5e7eb"/>
    <rect x="42" y="365" width="216" height="62" rx="18" fill="#fff" stroke="#e5e7eb"/>
    <rect x="42" y="444" width="216" height="44" rx="16" fill="#16a34a"/>
  </g>

  <g transform="translate(80 780)">
    <text x="0" y="0" class="title" font-size="30">Cosa è cambiato</text>
    <text x="0" y="42" class="sub" font-size="19">La scritta è scesa ed è libera, senza contenitore verde.</text>
    <text x="0" y="76" class="sub" font-size="19">Il trofeo è una forma ibrida: coppa, chat bubble, scudo e stella calcio in un solo simbolo.</text>
  </g>
</svg>
