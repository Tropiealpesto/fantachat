<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity=".18"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffad55"/>
      <stop offset="1" stop-color="#e07b1a"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00030a"/>
      <stop offset=".55" stop-color="#06111f"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <style>
      .page { fill:#f4f7f4; }
      .title { font:900 54px 'DM Sans','Inter',Arial,sans-serif; fill:#0f172a; letter-spacing:-1px; }
      .sub { font:700 24px 'DM Sans','Inter',Arial,sans-serif; fill:#64748b; }
      .cardTitle { font:900 23px 'DM Sans','Inter',Arial,sans-serif; fill:#0f172a; }
      .desc { font:700 16px 'DM Sans','Inter',Arial,sans-serif; fill:#64748b; }
      .frame { filter:url(#shadow); }
      .fc { font:1000 66px 'DM Sans','Inter',Arial,sans-serif; letter-spacing:-3px; }
      .word { font:1000 33px 'DM Sans','Inter',Arial,sans-serif; letter-spacing:-1px; }
      .micro { font:1000 16px 'DM Sans','Inter',Arial,sans-serif; letter-spacing:.6px; }
      .round { fill:none; stroke-linecap:round; stroke-linejoin:round; }
    </style>
  </defs>

  <rect class="page" width="1600" height="1200"/>
  <text x="80" y="92" class="title">FantaChat — badge home, seconda esplorazione</text>
  <text x="80" y="132" class="sub">Più vicini alle direzioni 2, 6 e 8: chat, nodo, community e arancione memorabile.</text>

  <!-- 13 -->
  <g transform="translate(80 190)">
    <rect width="320" height="300" rx="30" fill="#fff" stroke="#e5e7eb"/>
    <g class="frame" transform="translate(70 34)">
      <rect width="180" height="180" rx="42" fill="#fff"/>
      <circle cx="70" cy="82" r="42" fill="none" stroke="#16a34a" stroke-width="15"/>
      <circle cx="110" cy="98" r="42" fill="none" stroke="#e07b1a" stroke-width="15"/>
      <circle cx="90" cy="90" r="13" fill="#0f172a"/>
      <path d="M42 133l-18 20 32-7" fill="#16a34a"/>
      <path d="M138 47l18-20-32 7" fill="#e07b1a"/>
    </g>
    <text x="28" y="244" class="cardTitle">13. Doppia chat</text>
    <text x="28" y="272" class="desc">Evoluzione del 2, più riconoscibile e social.</text>
  </g>

  <!-- 14 -->
  <g transform="translate(460 190)">
    <rect width="320" height="300" rx="30" fill="#fff" stroke="#e5e7eb"/>
    <g class="frame" transform="translate(70 34)">
      <rect width="180" height="180" rx="42" fill="url(#dark)"/>
      <path d="M47 116c0-35 20-58 49-58 18 0 33 8 43 24" class="round" stroke="#58ff94" stroke-width="13" filter="url(#glow)"/>
      <path d="M133 64c0 35-20 58-49 58-18 0-33-8-43-24" class="round" stroke="#ff8a26" stroke-width="13" filter="url(#glow)"/>
      <circle cx="90" cy="90" r="8" fill="#fff"/>
    </g>
    <text x="28" y="244" class="cardTitle">14. Nodo neon</text>
    <text x="28" y="272" class="desc">Come il 2, ma compatibile col tema Twitch/neon.</text>
  </g>

  <!-- 15 -->
  <g transform="translate(840 190)">
    <rect width="320" height="300" rx="30" fill="#fff" stroke="#e5e7eb"/>
    <g class="frame" transform="translate(70 34)">
      <rect width="180" height="180" rx="42" fill="url(#green)"/>
      <path d="M46 50h88c18 0 31 13 31 31v30c0 18-13 31-31 31H86l-33 22v-22h-7c-18 0-31-13-31-31V81c0-18 13-31 31-31z" fill="#fff" opacity=".96"/>
      <path d="M61 91h59M61 73h76" stroke="#14532d" stroke-width="7" stroke-linecap="round"/>
      <circle cx="130" cy="102" r="13" fill="#e07b1a"/>
      <text x="130" y="109" text-anchor="middle" class="micro" fill="#fff">FC</text>
    </g>
    <text x="28" y="244" class="cardTitle">15. Bubble ufficiale</text>
    <text x="28" y="272" class="desc">Molto app, pulita, forte nel piccolo.</text>
  </g>

  <!-- 16 -->
  <g transform="translate(1220 190)">
    <rect width="320" height="300" rx="30" fill="#fff" stroke="#e5e7eb"/>
    <g class="frame" transform="translate(70 34)">
      <rect width="180" height="180" rx="42" fill="url(#orange)"/>
      <path d="M43 58h94c17 0 29 12 29 29v23c0 17-12 29-29 29H84l-30 22v-22H43c-17 0-29-12-29-29V87c0-17 12-29 29-29z" fill="rgba(255,255,255,.20)" stroke="#fff" stroke-width="5"/>
      <path d="M60 96h60M60 78h76" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
      <circle cx="132" cy="106" r="14" fill="#14532d"/>
    </g>
    <text x="28" y="244" class="cardTitle">16. Bubble arancio</text>
    <text x="28" y="272" class="desc">Più audace, vicina al gusto del numero 8.</text>
  </g>

  <!-- 17 -->
  <g transform="translate(80 540)">
    <rect width="320" height="300" rx="30" fill="#fff" stroke="#e5e7eb"/>
    <g class="frame" transform="translate(70 34)">
      <rect width="180" height="180" rx="42" fill="#fff"/>
      <path d="M90 28l56 23v39c0 42-24 65-56 81-32-16-56-39-56-81V51z" fill="#14532d"/>
      <path d="M72 74h39c13 0 23 10 23 23v8c0 13-10 23-23 23H89l-18 13v-13h-2c-13 0-23-10-23-23v-8c0-13 10-23 23-23z" fill="#fff"/>
      <circle cx="119" cy="112" r="10" fill="#e07b1a"/>
      <path d="M73 95h35" stroke="#14532d" stroke-width="6" stroke-linecap="round"/>
    </g>
    <text x="28" y="244" class="cardTitle">17. Scudo chat</text>
    <text x="28" y="272" class="desc">Sportiva ma più social del solito scudetto.</text>
  </g>

  <!-- 18 -->
  <g transform="translate(460 540)">
    <rect width="320" height="300" rx="30" fill="#fff" stroke="#e5e7eb"/>
    <g class="frame" transform="translate(70 34)">
      <rect width="180" height="180" rx="42" fill="#00030a"/>
      <path d="M44 126V58c0-11 9-20 20-20h52c11 0 20 9 20 20v68" fill="none" stroke="#58ff94" stroke-width="8" filter="url(#glow)"/>
      <path d="M62 72h56M62 96h56" stroke="#ff8a26" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
      <circle cx="90" cy="135" r="8" fill="#58ff94"/>
      <path d="M80 149h20" stroke="#58ff94" stroke-width="7" stroke-linecap="round"/>
    </g>
    <text x="28" y="244" class="cardTitle">18. Segnale chat</text>
    <text x="28" y="272" class="desc">Particolare, tech, molto memorabile.</text>
  </g>

  <!-- 19 -->
  <g transform="translate(840 540)">
    <rect width="320" height="300" rx="30" fill="#fff" stroke="#e5e7eb"/>
    <g class="frame" transform="translate(70 34)">
      <rect width="180" height="180" rx="42" fill="#f8fafc"/>
      <circle cx="90" cy="84" r="52" fill="#14532d"/>
      <path d="M58 82c9-20 20-31 32-31s23 11 32 31" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
      <path d="M54 111h72" stroke="#e07b1a" stroke-width="10" stroke-linecap="round"/>
      <path d="M66 128h48" stroke="#14532d" stroke-width="9" stroke-linecap="round"/>
      <text x="90" y="159" text-anchor="middle" class="micro" fill="#0f172a">CHAT</text>
    </g>
    <text x="28" y="244" class="cardTitle">19. Coppa messaggio</text>
    <text x="28" y="272" class="desc">Variante del trophy, meno giocosa.</text>
  </g>

  <!-- 20 -->
  <g transform="translate(1220 540)">
    <rect width="320" height="300" rx="30" fill="#fff" stroke="#e5e7eb"/>
    <g class="frame" transform="translate(70 34)">
      <rect width="180" height="180" rx="42" fill="url(#green)"/>
      <path d="M31 46h118v78H31z" fill="none" stroke="rgba(255,255,255,.55)" stroke-width="5"/>
      <path d="M90 46v78M31 85h118" stroke="rgba(255,255,255,.36)" stroke-width="4"/>
      <circle cx="90" cy="85" r="23" fill="none" stroke="rgba(255,255,255,.42)" stroke-width="4"/>
      <path d="M63 133h54c12 0 21 9 21 21v2H42v-2c0-12 9-21 21-21z" fill="#fff"/>
      <circle cx="123" cy="141" r="11" fill="#e07b1a"/>
    </g>
    <text x="28" y="244" class="cardTitle">20. Campo + chat</text>
    <text x="28" y="272" class="desc">Più calcio, ma resta collegata alla chat.</text>
  </g>

  <!-- 21 -->
  <g transform="translate(80 890)">
    <rect width="320" height="250" rx="30" fill="#fff" stroke="#e5e7eb"/>
    <g class="frame" transform="translate(82 24) scale(.86)">
      <rect width="180" height="180" rx="42" fill="#fff"/>
      <rect x="20" y="50" width="140" height="80" rx="28" fill="#f4f7f4" stroke="#dbe7df" stroke-width="3"/>
      <text x="90" y="99" text-anchor="middle" class="word">
        <tspan fill="#15803d">Fanta</tspan><tspan fill="#e07b1a">Chat</tspan>
      </text>
      <circle cx="140" cy="60" r="9" fill="#16a34a"/>
    </g>
    <text x="28" y="204" class="cardTitle">21. Scritta semplice</text>
    <text x="28" y="230" class="desc">Wordmark pulito, come richiesto.</text>
  </g>

  <!-- 22 -->
  <g transform="translate(460 890)">
    <rect width="320" height="250" rx="30" fill="#fff" stroke="#e5e7eb"/>
    <g class="frame" transform="translate(82 24) scale(.86)">
      <rect width="180" height="180" rx="42" fill="#00030a"/>
      <text x="90" y="88" text-anchor="middle" class="word" filter="url(#glow)">
        <tspan fill="#58ff94">Fanta</tspan><tspan fill="#ff8a26">Chat</tspan>
      </text>
      <path d="M54 111h72" stroke="#58ff94" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
      <circle cx="132" cy="112" r="7" fill="#ff8a26"/>
    </g>
    <text x="28" y="204" class="cardTitle">22. Wordmark neon</text>
    <text x="28" y="230" class="desc">Scritta semplice, ma più iconica nel dark.</text>
  </g>

  <!-- 23 -->
  <g transform="translate(840 890)">
    <rect width="320" height="250" rx="30" fill="#fff" stroke="#e5e7eb"/>
    <g class="frame" transform="translate(82 24) scale(.86)">
      <rect width="180" height="180" rx="42" fill="#14532d"/>
      <path d="M47 47h86c18 0 31 13 31 31v29c0 18-13 31-31 31H97l-37 26v-26H47c-18 0-31-13-31-31V78c0-18 13-31 31-31z" fill="#fff"/>
      <text x="91" y="109" text-anchor="middle" class="fc" fill="#14532d">FC</text>
      <circle cx="132" cy="57" r="12" fill="#e07b1a"/>
    </g>
    <text x="28" y="204" class="cardTitle">23. FC bubble</text>
    <text x="28" y="230" class="desc">Leggibile e molto app/social.</text>
  </g>

  <!-- 24 -->
  <g transform="translate(1220 890)">
    <rect width="320" height="250" rx="30" fill="#fff" stroke="#e5e7eb"/>
    <g class="frame" transform="translate(82 24) scale(.86)">
      <rect width="180" height="180" rx="42" fill="url(#dark)"/>
      <path d="M38 94c16-31 34-47 52-47s36 16 52 47c-16 31-34 47-52 47s-36-16-52-47z" fill="none" stroke="#58ff94" stroke-width="8" filter="url(#glow)"/>
      <path d="M70 94h40" stroke="#ff8a26" stroke-width="9" stroke-linecap="round" filter="url(#glow)"/>
      <circle cx="90" cy="94" r="9" fill="#fff"/>
    </g>
    <text x="28" y="204" class="cardTitle">24. Occhio lega</text>
    <text x="28" y="230" class="desc">Esotica, da community sempre attiva.</text>
  </g>
</svg>
