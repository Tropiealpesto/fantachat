<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="26" flood-color="#0f172a" flood-opacity=".22"/>
    </filter>
    <filter id="orangeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="appOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffb15b"/>
      <stop offset=".48" stop-color="#e98622"/>
      <stop offset="1" stop-color="#c9650f"/>
    </linearGradient>
    <linearGradient id="deepGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1fbf5b"/>
      <stop offset="1" stop-color="#0f5f2d"/>
    </linearGradient>
    <linearGradient id="cupLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7e8"/>
      <stop offset=".42" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffd49d"/>
    </linearGradient>
    <radialGradient id="shine" cx=".32" cy=".2" r=".9">
      <stop offset="0" stop-color="rgba(255,255,255,.55)"/>
      <stop offset=".38" stop-color="rgba(255,255,255,.12)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <style>
      .bg { fill:#f4f7f4; }
      .title { font:900 44px 'DM Sans','Inter',Arial,sans-serif; fill:#0f172a; letter-spacing:-.8px; }
      .sub { font:700 21px 'DM Sans','Inter',Arial,sans-serif; fill:#64748b; }
      .word { font:1000 45px 'DM Sans','Inter',Arial,sans-serif; letter-spacing:-1.8px; }
      .small { font:900 19px 'DM Sans','Inter',Arial,sans-serif; fill:#64748b; }
      .micro { font:1000 19px 'DM Sans','Inter',Arial,sans-serif; letter-spacing:.8px; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="900"/>
  <text x="80" y="86" class="title">Proposta icona: Trofeo FantaChat</text>
  <text x="80" y="124" class="sub">Direzione derivata dalla 8: arancione forte, trofeo proprietario, scritta compatta.</text>

  <!-- Enlarged app icon -->
  <g transform="translate(120 190)">
    <rect x="0" y="0" width="520" height="520" rx="116" fill="url(#appOrange)" filter="url(#softShadow)"/>
    <rect x="20" y="20" width="480" height="480" rx="96" fill="url(#shine)" opacity=".9"/>

    <!-- decorative pitch arc -->
    <path d="M64 398c86-98 179-147 279-147 39 0 77 8 113 24" fill="none" stroke="rgba(255,255,255,.20)" stroke-width="18" stroke-linecap="round"/>
    <path d="M73 428c87-76 177-114 270-114 39 0 77 6 113 18" fill="none" stroke="rgba(15,83,45,.18)" stroke-width="10" stroke-linecap="round"/>

    <!-- unique trophy -->
    <g transform="translate(104 80)">
      <!-- side handles -->
      <path d="M78 87H37c-19 0-31 13-31 31 0 43 42 76 88 78" fill="none" stroke="#fff6e8" stroke-width="26" stroke-linecap="round"/>
      <path d="M234 87h41c19 0 31 13 31 31 0 43-42 76-88 78" fill="none" stroke="#fff6e8" stroke-width="26" stroke-linecap="round"/>

      <!-- cup body: shield/chat hybrid -->
      <path d="M68 52h176c-3 98-29 153-88 184-59-31-85-86-88-184z" fill="url(#cupLight)" stroke="#fff" stroke-width="8" stroke-linejoin="round"/>
      <path d="M156 69c39 0 66 26 66 61 0 31-22 54-55 60l-11 25-11-25c-33-6-55-29-55-60 0-35 27-61 66-61z" fill="url(#deepGreen)"/>
      <path d="M129 128h54M137 107h38" stroke="#fff" stroke-width="13" stroke-linecap="round"/>
      <circle cx="194" cy="138" r="13" fill="#ff9d44"/>

      <!-- base -->
      <path d="M136 232h40v42h-40z" fill="#fff6e8"/>
      <path d="M96 278h120c16 0 29 13 29 29v11H67v-11c0-16 13-29 29-29z" fill="#fff6e8"/>
      <path d="M88 323h136" stroke="#0f5f2d" stroke-width="18" stroke-linecap="round"/>
    </g>

    <!-- wordmark on icon -->
    <g transform="translate(260 428)">
      <rect x="-164" y="-40" width="328" height="72" rx="28" fill="rgba(15,83,45,.25)" stroke="rgba(255,255,255,.38)" stroke-width="2"/>
      <text x="0" y="9" text-anchor="middle" class="word">
        <tspan fill="#ffffff">Fanta</tspan><tspan fill="#14532d">Chat</tspan>
      </text>
    </g>
  </g>

  <!-- small home screen preview -->
  <g transform="translate(760 210)">
    <rect x="0" y="0" width="300" height="550" rx="58" fill="#0f172a" filter="url(#softShadow)"/>
    <rect x="18" y="18" width="264" height="514" rx="44" fill="#f7faf8"/>
    <rect x="56" y="42" width="152" height="25" rx="12" fill="#111827"/>
    <text x="42" y="112" class="small">Schermata Home</text>

    <g transform="translate(38 150) scale(.42)">
      <rect x="0" y="0" width="180" height="180" rx="42" fill="url(#appOrange)"/>
      <path d="M28 139c31-35 64-52 99-52 14 0 27 3 40 9" fill="none" stroke="rgba(255,255,255,.20)" stroke-width="6" stroke-linecap="round"/>
      <g transform="translate(36 28) scale(.45)">
        <path d="M78 87H37c-19 0-31 13-31 31 0 43 42 76 88 78" fill="none" stroke="#fff6e8" stroke-width="26" stroke-linecap="round"/>
        <path d="M234 87h41c19 0 31 13 31 31 0 43-42 76-88 78" fill="none" stroke="#fff6e8" stroke-width="26" stroke-linecap="round"/>
        <path d="M68 52h176c-3 98-29 153-88 184-59-31-85-86-88-184z" fill="url(#cupLight)" stroke="#fff" stroke-width="8"/>
        <path d="M156 69c39 0 66 26 66 61 0 31-22 54-55 60l-11 25-11-25c-33-6-55-29-55-60 0-35 27-61 66-61z" fill="url(#deepGreen)"/>
        <path d="M129 128h54M137 107h38" stroke="#fff" stroke-width="13" stroke-linecap="round"/>
        <circle cx="194" cy="138" r="13" fill="#ff9d44"/>
        <path d="M136 232h40v42h-40z" fill="#fff6e8"/>
        <path d="M96 278h120c16 0 29 13 29 29v11H67v-11c0-16 13-29 29-29z" fill="#fff6e8"/>
      </g>
      <text x="90" y="157" text-anchor="middle" class="micro">
        <tspan fill="#fff">Fanta</tspan><tspan fill="#14532d">Chat</tspan>
      </text>
    </g>

    <text x="42" y="250" class="small" fill="#0f172a">FantaChat</text>
    <rect x="42" y="286" width="216" height="62" rx="18" fill="#fff" stroke="#e5e7eb"/>
    <rect x="42" y="365" width="216" height="62" rx="18" fill="#fff" stroke="#e5e7eb"/>
    <rect x="42" y="444" width="216" height="44" rx="16" fill="#16a34a"/>
  </g>

  <g transform="translate(80 780)">
    <text x="0" y="0" class="title" font-size="30">Note design</text>
    <text x="0" y="42" class="sub" font-size="19">Il trofeo non è una coppa classica: dentro ha una bubble chat verde, quindi diventa un simbolo proprietario di FantaChat.</text>
    <text x="0" y="76" class="sub" font-size="19">La scritta c’è, ma non è l’unico elemento: se su home screen diventa piccola, il trofeo resta riconoscibile.</text>
  </g>
</svg>
